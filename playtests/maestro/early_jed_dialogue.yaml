appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "New Game"
    timeout: 60000
- tapOn: "New Game"
- extendedWaitUntil:
    visible: "Wake Up Call"
    timeout: 20000
- tapOn: "Continue"
- tapOn: "CONTINUE"
- assertVisible: "bunk light"
- tapOn: "bunk light"
- extendedWaitUntil:
    visible: "The bunk light snaps on.*"
    timeout: 10000
- tapOn: ".*The bunk light snaps on.*"
- extendedWaitUntil:
    visible: "Nova's Bunk"
    timeout: 10000
- tapOn: "CONTINUE"
- tapOn: "Travel west"
- extendedWaitUntil:
    visible: "Pod Row"
    timeout: 60000
- tapOn: "Travel south"
- extendedWaitUntil:
    visible: "Lift Shaft"
    timeout: 15000
- extendedWaitUntil:
    visible: "CONTINUE"
    timeout: 10000
- tapOn: "CONTINUE"
- extendedWaitUntil:
    visible: "CONTINUE"
    timeout: 10000
- tapOn: "CONTINUE"
- tapOn: "Travel west"
- extendedWaitUntil:
    visible: "Jed's Bunk"
    timeout: 15000
- extendedWaitUntil:
    visible: "QUEST UPDATED"
    timeout: 10000
- tapOn: "Dismiss Quest Banner"
- extendedWaitUntil:
    notVisible: "QUEST UPDATED"
    timeout: 10000
- extendedWaitUntil:
    visible: "CONTINUE"
    timeout: 10000
- tapOn: "CONTINUE"
- tapOn: "Jed"
- extendedWaitUntil:
    visible: "CONTINUE"
    timeout: 10000
- tapOn: "CONTINUE"
- extendedWaitUntil:
    visible: ".*You look like.*"
    timeout: 10000
- assertVisible: "Jed"
- takeScreenshot: early-jed-dialogue
