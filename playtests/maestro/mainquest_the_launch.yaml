appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible: "New Game"
    timeout: 60000
- extendedWaitUntil:
    visible: "Debug Scenarios"
    timeout: 10000
- tapOn: "Debug Scenarios"
- extendedWaitUntil:
    visible: "Search world, quest, room, or system"
    timeout: 10000
- tapOn: "Search world, quest, room, or system"
- inputText: "The Launch"
- runScript: sleep.js
- extendedWaitUntil:
    visible: "Resume MQ05 in the launch bay.*"
    timeout: 10000
- tapOn: "Resume MQ05 in the launch bay.*"
- extendedWaitUntil:
    visible: "Pod Bay"
    timeout: 15000
- extendedWaitUntil:
    notVisible: "Engage The Iron Warden"
    timeout: 1000
- assertVisible: "Zeke"
- tapOn: "Zeke"
- extendedWaitUntil:
    visible: ".*Warden's down.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*have the Chime.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*Inside.*seal the hatch.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    notVisible: "Dialogue Popup"
    timeout: 10000
- tapOn: "Travel north.*"
- extendedWaitUntil:
    visible: "The Pod Core"
    timeout: 15000
- assertVisible: "Zeke"
- tapOn: "Zeke"
- extendedWaitUntil:
    visible: ".*matching port.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*Here goes.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*Core is live.*Start the launch sequence.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    notVisible: "Dialogue Popup"
    timeout: 10000
- tapOn: "navigation console"
- extendedWaitUntil:
    visible: ".*pod clears the launch rail.*own capacitors.*"
    timeout: 15000
- takeScreenshot: planetary-impact-cinematic
- tapOn: "Tap to continue.*"
- extendedWaitUntil:
    visible: ".*forced route misses.*traffic corridor.*storm front.*"
    timeout: 10000
- tapOn: "Tap to continue.*"
- extendedWaitUntil:
    visible: ".*Crosswind rolls the pod.*stabilizer.*"
    timeout: 10000
- tapOn: "Tap to continue.*"
- extendedWaitUntil:
    visible: ".*navigation bus is burning out.*route lock won't release.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*navigation console arcs and dies.*hull starts tearing.*"
    timeout: 10000
- tapOn: "Tap to continue.*"
- extendedWaitUntil:
    visible: ".*shield rejects the pod.*"
    timeout: 10000
- tapOn: "Tap to continue.*"
- extendedWaitUntil:
    visible: ".*pod drops through the canopy and hits hard.*"
    timeout: 10000
- tapOn: "Tap to continue.*"
- extendedWaitUntil:
    visible: ".*pod is down in Sector 9.*Zeke is injured.*live circuits.*"
    timeout: 10000
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Crash Site"
    timeout: 20000
- extendedWaitUntil:
    visible: "QUEST COMPLETED"
    timeout: 10000
- assertVisible: "The Launch"
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "New Quest"
    timeout: 10000
- assertVisible: "A Strange Coast"
- tapOn: "Continue"
- extendedWaitUntil:
    notVisible: "New Quest"
    timeout: 10000
- assertVisible: "Crash Site"
- assertVisible: "Zeke"
- takeScreenshot: mainquest-the-launch
