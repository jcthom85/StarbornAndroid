- extendedWaitUntil:
    visible: "Crash Site"
    timeout: 20000
- extendedWaitUntil:
    visible: "New Quest"
    timeout: 10000
- assertVisible: "A Strange Coast"
- tapOn: "Continue"
- extendedWaitUntil:
    notVisible: "New Quest"
    timeout: 10000
- extendedWaitUntil:
    visible: "Quest Updated"
    timeout: 10000
- tapOn: "Dismiss Quest Banner"
