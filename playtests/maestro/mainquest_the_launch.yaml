- takeScreenshot: planetary-impact-cinematic
- tapOn: "Cinematic Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*view out the viewport fractures.*"
    timeout: 10000
- tapOn: "Cinematic Popup. Tap to continue"
