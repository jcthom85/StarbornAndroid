    timeout: 1000
- assertVisible: "Talk to Zeke"
- tapOn: "Talk to Zeke"
- extendedWaitUntil:
    visible: ".*Warden's down.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*Chime is the key.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*Get inside the pod.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    notVisible: "Dialogue Popup"
    timeout: 10000
- tapOn: "Travel north"
- extendedWaitUntil:
