appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Debug Scenarios"
    timeout: 60000
- tapOn: "Debug Scenarios"
- extendedWaitUntil:
    visible: "Search world, quest, room, or system"
    timeout: 10000
- tapOn: "Search world, quest, room, or system"
- inputText: "Sector 9 Ruins"
- hideKeyboard
- tapOn: "World 2 / Sector 9 Ruins"
- extendedWaitUntil:
    visible: "Sector 9 Ruins"
    timeout: 30000

# Stasis Chamber environmental chain
- tapOn: "Enter Hall of Echoes"
- extendedWaitUntil:
    visible: "Enter"
    timeout: 10000
- tapOn: "Enter"
- extendedWaitUntil:
    visible: "Hall of Echoes"
    timeout: 15000
- assertVisible: "murals"
- tapOn: "murals"
- extendedWaitUntil:
    visible: "The murals are not decoration.*"
    timeout: 10000
- tapOn: ".*The murals are not decoration.*"
- assertVisible: "Travel south"
- tapOn: "Travel south"
- extendedWaitUntil:
    visible: "Continue"
    timeout: 10000
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Stasis Chamber"
    timeout: 15000
- assertVisible: "stasis pod"
- tapOn: "stasis pod"
- extendedWaitUntil:
    visible: "The pod is not a prison.*"
    timeout: 15000
- tapOn: ".*The pod is not a prison.*"
- assertVisible: "Travel east"
- tapOn: "Travel east"
- extendedWaitUntil:
    visible: "Ring Array"
    timeout: 15000
- assertVisible: "ring console"
- tapOn: "ring console"
- extendedWaitUntil:
    visible: "The rings refuse to move until.*"
    timeout: 15000
- tapOn: ".*The rings refuse to move until.*"
- assertVisible: "Travel north"
- tapOn: "Travel north"
- extendedWaitUntil:
    visible: "Observation Deck"
    timeout: 15000
- assertVisible: "stasis mural overview"
- tapOn: "stasis mural overview"
- extendedWaitUntil:
    visible: "The overview shows three sockets.*"
    timeout: 15000
- tapOn: ".*The overview shows three sockets.*"
- assertVisible: "Travel south"
- tapOn: "Travel south"
- extendedWaitUntil:
    visible: "Ring Array"
    timeout: 15000
- assertVisible: "Travel south"
- tapOn: "Travel south"
- extendedWaitUntil:
    visible: "Coolant Lines"
    timeout: 15000
- assertVisible: "coolant garden"
- tapOn: "coolant garden"
- extendedWaitUntil:
    visible: "Nova opens the coolant garden.*"
    timeout: 15000
- tapOn: ".*Nova opens the coolant garden.*"
- assertVisible: "Travel north"
- tapOn: "Travel north"
- extendedWaitUntil:
    visible: "Ring Array"
    timeout: 15000
- assertVisible: "ring console"
- tapOn: "ring console"
- extendedWaitUntil:
    visible: "Orion joined the party."
    timeout: 15000
- tapOn: "Tap to continue"
- extendedWaitUntil:
    visible: "Quest Completed"
    timeout: 15000
- assertVisible: "Sleeping Giant"
- tapOn: "Continue"
- extendedWaitUntil:
    notVisible: "Quest Completed"
    timeout: 10000

