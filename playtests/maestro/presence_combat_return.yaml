appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "New Game"
    timeout: 60000
- swipe:
    direction: UP
- swipe:
    direction: UP
- extendedWaitUntil:
    visible: "Debug: Presence Stress"
    timeout: 10000
- tapOn: "Debug: Presence Stress"
- extendedWaitUntil:
    visible: "Presence Stress Test"
    timeout: 15000
- assertVisible: "Talk to Zeke"
- assertVisible: "Pick up Medkit I"
- assertVisible: "Engage Acoustic Bulwark"
- tapOn: "Engage Acoustic Bulwark"
- extendedWaitUntil:
    visible: "HOSTILE CONTACT"
    timeout: 60000
- extendedWaitUntil:
    visible: "Acoustic Bulwark"
    timeout: 15000
- tapOn: "Nova"
- extendedWaitUntil:
    visible: "Attack"
    timeout: 20000
- tapOn: "Abilities"
- extendedWaitUntil:
    visible: "Hydraulic Kick"
    timeout: 10000
- tapOn:
    text: "Use"
    index: 1
- extendedWaitUntil:
    visible: "Choose an enemy for Hydraulic Kick"
    timeout: 10000
- tapOn: "Acoustic Bulwark"
- waitForAnimationToEnd:
    timeout: 8000
- extendedWaitUntil:
    visible: "Spoils Recovered"
    timeout: 60000
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Presence Stress Test"
    timeout: 15000
- extendedWaitUntil:
    notVisible: "Engage Acoustic Bulwark"
    timeout: 10000
- assertVisible: "Talk to Zeke"
- assertVisible: "Talk to Scrapper"
- assertVisible: "People in room"
- assertVisible: "Pick up Medkit I"
- assertVisible: "Pick up Scrap Metal"
- assertVisible: "Items in room"
- assertVisible: "Engage Dominion Dampener \\+ Resonance Buoy party"
- assertVisible: "Engage Echo Borer \\+ Siren Skimmer party"
- assertVisible: "Hostiles in room"
- takeScreenshot: presence-combat-return
