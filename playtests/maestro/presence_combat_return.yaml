appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "New Game"
    timeout: 60000
- scrollUntilVisible:
    element:
      text: "Debug: Presence Stress"
    direction: DOWN
    timeout: 20000
    visibilityPercentage: 50
- extendedWaitUntil:
    visible: "Debug: Presence Stress"
    timeout: 10000
- tapOn: "Debug: Presence Stress"
- extendedWaitUntil:
    visible: "Presence Stress Test"
    timeout: 15000
- assertVisible: "Zeke"
- assertVisible: "Medkit I"
- assertVisible: "Engage Acoustic Bulwark"
- tapOn: "Engage Acoustic Bulwark"
- extendedWaitUntil:
    visible: "HOSTILE CONTACT"
    timeout: 60000
- extendedWaitUntil:
    visible: "Acoustic Bulwark"
    timeout: 15000
- tapOn: "Nova"
- extendedWaitUntil:
    visible: "Attack"
    timeout: 20000
- tapOn: "Abilities"
- extendedWaitUntil:
    visible: "Hydraulic Kick"
    timeout: 10000
- tapOn:
    text: "Use"
    index: 1
- extendedWaitUntil:
    visible: "Choose an enemy for Hydraulic Kick"
    timeout: 10000
- tapOn: "Acoustic Bulwark"
- waitForAnimationToEnd:
    timeout: 8000
- extendedWaitUntil:
    visible: "Spoils Recovered"
    timeout: 60000
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Presence Stress Test"
    timeout: 15000
- extendedWaitUntil:
    notVisible: "Engage Acoustic Bulwark"
    timeout: 10000
- assertVisible: "Zeke"
- assertVisible: "Scrapper"
- assertVisible: "People"
- assertVisible: "Medkit I"
- assertVisible: "Scrap Metal"
- assertVisible: "Items"
- assertVisible: "Engage Dominion Dampener"
- assertVisible: "Engage Echo Borer"
- takeScreenshot: presence-combat-return
