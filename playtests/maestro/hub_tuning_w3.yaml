appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Debug Scenarios"
    timeout: 60000
- tapOn: "Debug Scenarios"
- extendedWaitUntil:
    visible: "Search world, quest, room, or system"
    timeout: 10000
- tapOn: "Search world, quest, room, or system"
- inputText: "W3 Tuning"
- hideKeyboard
- tapOn: "Hub QA / W3 Tuning"
- extendedWaitUntil:
    visible: "Prism Gallery"
    timeout: 30000
- assertNotVisible: "light puzzle"
- assertVisible: "prism shutters"
- tapOn: "prism shutters"
- extendedWaitUntil:
    visible: "Orion reads the shutters by ear.*"
    timeout: 10000
- tapOn: ".*Orion reads the shutters by ear.*"
- extendedWaitUntil:
    visible: "Prism Gallery"
    timeout: 10000
- takeScreenshot: hub-tuning-w3
