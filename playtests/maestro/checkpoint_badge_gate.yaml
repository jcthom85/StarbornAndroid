appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Debug Scenarios"
    timeout: 60000
- tapOn: "Debug Scenarios"
- extendedWaitUntil:
    visible: "Content"
    timeout: 10000
- tapOn: "Content"
- scrollUntilVisible:
    element:
      text: "Transit Checkpoint"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 70
- tapOn: "Transit Checkpoint"
- extendedWaitUntil:
    visible: "Shift Queue"
    timeout: 15000
- extendedWaitUntil:
    visible: "New Quest"
    timeout: 10000
- assertVisible: "Shift Clearance"
- tapOn: "Continue"
- extendedWaitUntil:
    notVisible: "New Quest"
    timeout: 10000
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "Travel north"
- extendedWaitUntil:
    visible: "Search Bay"
    timeout: 15000
- tapOn: "Guard Hank"
- extendedWaitUntil:
    visible: "Badge."
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "Morning to you too."
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "No badge, no entry. Try the booth."
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    notVisible: "Dialogue Popup"
    timeout: 10000
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "Travel east"
- extendedWaitUntil:
    visible: "Zeke's Booth"
    timeout: 15000
- tapOn: "Zeke"
- extendedWaitUntil:
    visible: "Name, ID, clearance... Oh. You."
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "I need the pass. Shift starts in ten."
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "Right. One moment."
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*mandatory retirement.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "What does that mean?"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "They kill you and reclaim the cost."
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "I can change the cause. It has to blame the grid, not you."
    timeout: 10000
- extendedWaitUntil:
    visible: ".*Grid Instability.*"
    timeout: 10000
- tapOn: ".*Grid Instability.*"
- extendedWaitUntil:
    visible: ".*Take the badge.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "ITEM ACQUIRED"
    timeout: 15000
- assertVisible: "Mine Access Badge"
- tapOn: "Tap to continue"
- extendedWaitUntil:
    visible: "QUEST COMPLETED"
    timeout: 15000
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "New Quest"
    timeout: 15000
- assertVisible: "The Echo"
- tapOn: "Continue"
- extendedWaitUntil:
    notVisible: "New Quest"
    timeout: 10000
- tapOn: "Travel west.*"
- extendedWaitUntil:
    visible: "Search Bay"
    timeout: 15000
- tapOn: "Travel north"
- extendedWaitUntil:
    visible: "Blast Door A"
    timeout: 15000
- tapOn: "Travel north"
- extendedWaitUntil:
    visible: "Transit Tunnel"
    timeout: 15000
- tapOn: "Travel north"
- extendedWaitUntil:
    visible: ".*FOREMAN REVIEW REQUIRED.*"
    timeout: 15000
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Concourse Lobby"
    timeout: 15000
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "Boggs"
- extendedWaitUntil:
    visible: ".*temporary badge landed on my review queue.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*routed to Logistics review.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*Pass shield training and I'll clear the lift.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*Clear the cargo and finish the shield drill.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "New Quest"
    timeout: 10000
- assertVisible: ".*Heavy Lifting.*"
- tapOn: "Continue"
- extendedWaitUntil:
    notVisible: "New Quest"
    timeout: 10000
- tapOn: "LEAVE"
- extendedWaitUntil:
    visible: "Logistics Sector"
    timeout: 15000
- assertVisible: "Enter Admin Concourse"
- tapOn: "Enter Admin Concourse"
- tapOn: "Enter"
- extendedWaitUntil:
    visible: "Concourse Lobby"
    timeout: 15000
- takeScreenshot: checkpoint-badge-gate
