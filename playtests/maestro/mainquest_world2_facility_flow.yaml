appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Debug Scenarios"
    timeout: 60000
- tapOn: "Debug Scenarios"
- extendedWaitUntil:
    visible: "Search world, quest, room, or system"
    timeout: 10000
- tapOn: "Search world, quest, room, or system"
- inputText: "Sector 9 Ruins"
- hideKeyboard
- tapOn: "World 2 / Sector 9 Ruins"
- extendedWaitUntil:
    visible: "Sector 9 Ruins"
    timeout: 30000

# 1. Enter Hall of Echoes
- tapOn: "Enter Hall of Echoes"
- extendedWaitUntil:
    visible: "Hall of Echoes"
    timeout: 15000

# 2. Inspect the murals
- assertVisible: "murals"
- tapOn: "murals"
- extendedWaitUntil:
    visible: "You inspect the resonance murals. They map out the harmonic alignments of the facility."
    timeout: 10000
- tapOn: "You inspect the resonance murals. They map out the harmonic alignments of the facility."

# 3. Enter Stasis Chamber
- assertVisible: "Travel south"
- tapOn: "Travel south"
- extendedWaitUntil:
    visible: "Stasis Chamber"
    timeout: 15000

# 4. Talk to Zeke to wake Orion
- assertVisible: "Zeke"
- tapOn: "Zeke"
- extendedWaitUntil:
    visible: "The stasis pod is completely locked down by safety alignment rings.*"
    timeout: 15000
- tapOn: ".*Broadcast C# Minor 7.*"
- extendedWaitUntil:
    visible: "It worked! The stasis rings are locking into alignment.*"
    timeout: 15000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "Quest Complete"
    timeout: 15000
- assertVisible: "Sleeping Giant"
- tapOn: "Got it"
- extendedWaitUntil:
    notVisible: "Quest Complete"
    timeout: 10000

