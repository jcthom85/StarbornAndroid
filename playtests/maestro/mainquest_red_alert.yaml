appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible: "New Game"
    timeout: 60000
- tapOn: "Debug Scenarios"
- tapOn: "Search world, quest, room, or system"
- inputText: "lockdown"
- pressKey: BACK
- extendedWaitUntil:
    visible: "Red Alert"
    timeout: 10000
- tapOn: "Red Alert"
- extendedWaitUntil:
    visible: "Zeke:.*Follow the red strobes.*"
    timeout: 15000
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Emergency Exit"
    timeout: 15000
- assertVisible: "Reach the Cargo Lift."
- tapOn: "Travel north.*"
- extendedWaitUntil:
    visible: "Maintenance Access"
    timeout: 15000
- extendedWaitUntil:
    notVisible: "Engage Resonance Buoy"
    timeout: 1000
- tapOn: "Travel north.*"
- extendedWaitUntil:
    visible: "Cargo Lift"
    timeout: 15000
- assertVisible: ".*Take Jed's Chime.*"
- extendedWaitUntil:
    notVisible: "Engage Acoustic Bulwark"
    timeout: 1000
- tapOn: "Jed"
- extendedWaitUntil:
    visible: ".*alarm broadcast.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*calling me a contaminant.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*manual override panel.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*not leaving you behind.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*take this Chime.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    notVisible: "Dialogue Popup"
    timeout: 10000
- extendedWaitUntil:
    visible: "Acquired Ghost Signal Cell"
    timeout: 15000
- tapOn: "DISMISS"
- extendedWaitUntil:
    visible: "Quest Completed"
    timeout: 15000
- assertVisible: "Red Alert"
- assertVisible: "The Launch"
- tapOn: "Continue"
- extendedWaitUntil:
    notVisible: "Quest Completed"
    timeout: 10000
- assertVisible: "Cargo Lift"
- takeScreenshot: mainquest-red-alert
