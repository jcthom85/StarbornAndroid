appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "New Game"
    timeout: 60000
- tapOn: "New Game"
- extendedWaitUntil:
    visible: "Wake Up Call"
    timeout: 20000
- tapOn: "Continue"
- extendedWaitUntil:
    visible: ".*tap highlighted words.*|CONTINUE"
    timeout: 10000
- assertVisible: "CONTINUE"
- tapOn: "CONTINUE"
- extendedWaitUntil:
    notVisible: "CONTINUE"
    timeout: 10000
- assertVisible: "bunk light"
- takeScreenshot: early-tutorial-dismissed
