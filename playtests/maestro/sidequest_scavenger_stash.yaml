appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Debug Scenarios"
    timeout: 60000
- tapOn: "Debug Scenarios"
- tapOn: "Search world, quest, room, or system"
- inputText: "Trade Row side"
- pressKey: BACK
- extendedWaitUntil:
    visible: "Scavenger's Stash"
    timeout: 10000
- tapOn: "Scavenger's Stash"
- extendedWaitUntil:
    visible: "Scrapper's Stall"
    timeout: 15000
- tapOn: "Talk to Scrapper"
- extendedWaitUntil:
    visible: ".*Old resistance stock.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "Why not grab it yourself?"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*Find the crate.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    notVisible: "Dialogue Popup"
    timeout: 10000
- extendedWaitUntil:
    visible: "New Quest"
    timeout: 10000
- assertVisible: "The Scavenger's Stash"
- tapOn: "Dismiss"
- extendedWaitUntil:
    notVisible: "New Quest"
    timeout: 10000
- tapOn: "Travel south"
- extendedWaitUntil:
    visible: "Market Strip"
    timeout: 15000
- tapOn:
    point: "90%,52%"
- extendedWaitUntil:
    visible: "The Hidden Stash"
    timeout: 15000
- extendedWaitUntil:
    visible: "Quest Updated"
    timeout: 10000
- assertVisible: "Open the old rebel cache."
- extendedWaitUntil:
    notVisible: "Quest Updated"
    timeout: 10000
- tapOn: "rebel cache"
- extendedWaitUntil:
    visible: "Rebel Cache"
    timeout: 10000
- assertVisible: "Pulse Grenade"
- tapOn: "Tap to continue"
- extendedWaitUntil:
    notVisible: "Rebel Cache"
    timeout: 10000
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Acquired Pulse Grenade"
    timeout: 10000
- tapOn: "DISMISS"
- assertVisible: "Return to Scrapper."
- tapOn:
    point: "9%,52%"
- extendedWaitUntil:
    visible: "Market Strip"
    timeout: 15000
- tapOn: "Travel north"
- extendedWaitUntil:
    visible: "Scrapper's Stall"
    timeout: 15000
- tapOn: "Talk to Scrapper"
- extendedWaitUntil:
    visible: ".*You opened it.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "They scratched names into the lid."
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*Take the grenades.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "Acquired 2 x Pulse Grenade"
    timeout: 10000
- tapOn: "DISMISS"
- extendedWaitUntil:
    visible: "Quest Completed"
    timeout: 10000
- assertVisible: "The Scavenger's Stash"
- tapOn: "Dismiss"
- extendedWaitUntil:
    notVisible: "Quest Completed"
    timeout: 10000
- takeScreenshot: sidequest-scavenger-stash
