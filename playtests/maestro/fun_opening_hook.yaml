appId: com.junewiregames.starborn.prealpha
---
- runFlow: start_new_game.yaml
- assertNotVisible: "???"
- assertVisible: "Nova can find the bunk edge.*bunk light switch.*"
- assertVisible: "bunk light"
- takeScreenshot: fun-opening-identified-nova
- tapOn: "bunk light"
- extendedWaitUntil:
    visible: "The bunk light coughs on.*"
    timeout: 10000
- tapOn: ".*The bunk light coughs on.*"
- extendedWaitUntil:
    visible: ".*scorched conduit.*"
    timeout: 10000
- takeScreenshot: fun-opening-suppressed-fault
- tapOn: "scorched conduit"
- extendedWaitUntil:
    visible: ".*Three repair requests.*closed automatically.*"
    timeout: 15000
- takeScreenshot: fun-opening-cover-up
- tapOn: ".*Three repair requests.*closed automatically.*"
- extendedWaitUntil:
    visible: "Swipe toward any open exit to move.*"
    timeout: 10000
- tapOn: "CONTINUE"
- extendedWaitUntil:
    visible: ".*closed maintenance ticket remains.*"
    timeout: 10000
- assertVisible: "Travel west"
- takeScreenshot: fun-opening-hook-complete
