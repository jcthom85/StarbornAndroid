appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Debug Scenarios"
    timeout: 60000
- tapOn:
    point: "50%,73%"
- extendedWaitUntil:
    visible: "Launching replaces the current unsaved session."
    timeout: 10000
- tapOn: "Search world, quest, room, or system"
- inputText: "storage room"
- pressKey: BACK
- extendedWaitUntil:
    visible: "Room Items"
    timeout: 10000
- tapOn: "Room Items"
- extendedWaitUntil:
    visible: "Med Supply Closet"
    timeout: 15000
- tapOn: "Travel west"
- extendedWaitUntil:
    visible: "Doc's Exam Room"
    timeout: 15000
- tapOn: "Doc"
- extendedWaitUntil:
    visible: ".*vents are backing poison.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "Again?"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*Patch the cracked vent.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    notVisible: "Dialogue Popup"
    timeout: 10000
- extendedWaitUntil:
    visible: "New Quest"
    timeout: 10000
- assertVisible: "System Flush"
- tapOn: "Dismiss"
- extendedWaitUntil:
    notVisible: "New Quest"
    timeout: 10000
- takeScreenshot: sidequest-system-flush-progress
- tapOn: "Travel south"
- extendedWaitUntil:
    visible: "Triage Hall"
    timeout: 15000
- tapOn: "Travel east"
- extendedWaitUntil:
    visible: "Ventilation Hub"
    timeout: 15000
- extendedWaitUntil:
    visible: "Inspect the cracked vent."
    timeout: 10000
- tapOn: "vent"
- extendedWaitUntil:
    visible: "Continue"
    timeout: 10000
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Reroute the failing fans."
    timeout: 10000
- tapOn: "fans"
- extendedWaitUntil:
    visible: "Continue"
    timeout: 10000
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Clear the toxic blockage."
    timeout: 10000
- tapOn: "toxic blockage"
- extendedWaitUntil:
    visible: "Continue"
    timeout: 10000
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Return to Doc."
    timeout: 10000
- tapOn: "Travel west"
- extendedWaitUntil:
    visible: "Triage Hall"
    timeout: 15000
- tapOn: "Travel north"
- extendedWaitUntil:
    visible: "Doc's Exam Room"
    timeout: 15000
- tapOn: "Doc"
- extendedWaitUntil:
    visible: ".*coughing stopped.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*Fixed. Mostly.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*Corrosive rounds.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "Acquired Corrosive Rounds"
    timeout: 15000
- tapOn: "DISMISS"
- extendedWaitUntil:
    visible: "Quest Completed"
    timeout: 10000
- assertVisible: "System Flush"
- tapOn: "Dismiss"
- extendedWaitUntil:
    notVisible: "Quest Completed"
    timeout: 10000
- takeScreenshot: sidequest-system-flush
