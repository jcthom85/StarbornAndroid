appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Debug: Room Items"
    timeout: 60000
- tapOn: "Debug: Room Items"
- extendedWaitUntil:
    visible: "Med Supply Closet"
    timeout: 15000
- tapOn: "Travel west"
- extendedWaitUntil:
    visible: "Doc's Exam Room"
    timeout: 15000
- tapOn: "Doc"
- extendedWaitUntil:
    visible: ".*vents are backing poison.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "Again?"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*Patch the cracked vent.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    notVisible: "Dialogue Popup"
    timeout: 10000
- extendedWaitUntil:
    visible: "New Quest"
    timeout: 10000
- assertVisible: "System Flush"
- tapOn: "Dismiss"
- extendedWaitUntil:
    notVisible: "New Quest"
    timeout: 10000
- extendedWaitUntil:
    visible: "Quest Updated"
    timeout: 10000
- assertVisible: "Talk to Doc in the Med-Bay."
- takeScreenshot: sidequest-system-flush-progress
- tapOn: "Dismiss Quest Banner"
- extendedWaitUntil:
    notVisible: "Quest Updated"
    timeout: 10000
- tapOn: "Travel south"
- extendedWaitUntil:
    visible: "Triage Hall"
    timeout: 15000
- tapOn: "Travel east"
- extendedWaitUntil:
    visible: "Ventilation Hub"
    timeout: 15000
- extendedWaitUntil:
    visible: "Quest Updated"
    timeout: 10000
- assertVisible: "Enter the ventilation hub."
- tapOn: "Dismiss Quest Banner"
- extendedWaitUntil:
    notVisible: "Quest Updated"
    timeout: 10000
- tapOn: "Inspect Vent"
- extendedWaitUntil:
    visible: "Quest Updated"
    timeout: 10000
- assertVisible: "Return to Doc."
- tapOn: "Dismiss Quest Banner"
- extendedWaitUntil:
    notVisible: "Quest Updated"
    timeout: 10000
- tapOn: "Travel west"
- extendedWaitUntil:
    visible: "Triage Hall"
    timeout: 15000
- tapOn: "Travel north"
- extendedWaitUntil:
    visible: "Doc's Exam Room"
    timeout: 15000
- tapOn: "Doc"
- extendedWaitUntil:
    visible: ".*coughing stopped.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*Fixed. Mostly.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*Corrosive rounds.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "Quest Completed"
    timeout: 10000
- assertVisible: "System Flush"
- tapOn: "Dismiss"
- extendedWaitUntil:
    notVisible: "Quest Completed"
    timeout: 10000
- takeScreenshot: sidequest-system-flush
