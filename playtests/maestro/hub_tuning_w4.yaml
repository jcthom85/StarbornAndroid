appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Debug Scenarios"
    timeout: 60000
- tapOn: "Debug Scenarios"
- extendedWaitUntil:
    visible: "Search world, quest, room, or system"
    timeout: 10000
- tapOn: "Search world, quest, room, or system"
- inputText: "W4 Forge"
- hideKeyboard
- tapOn: "Hub QA / W4 Forge"
- extendedWaitUntil:
    visible: "The Forge"
    timeout: 30000
- assertNotVisible: "conveyor puzzle"
- assertNotVisible: "Conveyor Timing Puzzle"
- assertVisible: "anvil cradle"
- tapOn: "anvil cradle"
- extendedWaitUntil:
    visible: "The cradle will not open until.*"
    timeout: 10000
- takeScreenshot: hub-tuning-w4
