appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "New Game"
    timeout: 60000
- swipe:
    direction: UP
- swipe:
    direction: UP
- extendedWaitUntil:
    visible: "Debug: Enemy Party"
    timeout: 10000
- tapOn: "Debug: Enemy Party"
- extendedWaitUntil:
    visible: "Security Checkpoint B"
    timeout: 15000
- extendedWaitUntil:
    visible: "Engage Dominion Dampener + Resonance Buoy party"
    timeout: 10000
- tapOn: "Engage Dominion Dampener + Resonance Buoy party"
- extendedWaitUntil:
    visible: "HOSTILE CONTACT"
    timeout: 60000
- tapOn: "Orion"
- extendedWaitUntil:
    visible: "Attack"
    timeout: 15000
- assertVisible: "Abilities"
- tapOn: "Orion"
- extendedWaitUntil:
    notVisible: "Attack"
    timeout: 5000
- extendedWaitUntil:
    notVisible: "Abilities"
    timeout: 5000
- takeScreenshot: combat-menu-dismiss
