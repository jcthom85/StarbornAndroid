appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "New Game"
    timeout: 60000
- swipe:
    direction: UP
- swipe:
    direction: UP
- extendedWaitUntil:
    visible: "Debug: Enemy Party"
    timeout: 10000
- tapOn: "Debug: Enemy Party"
- extendedWaitUntil:
    visible: "Security Checkpoint B"
    timeout: 15000
- extendedWaitUntil:
    visible: "Engage Dominion Dampener + Resonance Buoy party"
    timeout: 10000
- tapOn: "Engage Dominion Dampener + Resonance Buoy party"
- extendedWaitUntil:
    visible: "HOSTILE CONTACT"
    timeout: 60000
- tapOn: "Zeke"
- extendedWaitUntil:
    visible: "Abilities"
    timeout: 15000
- tapOn: "Abilities"
- extendedWaitUntil:
    visible: "Shatter Blow"
    timeout: 15000
- tapOn:
    text: "Use"
    index: 0
- extendedWaitUntil:
    visible: "Choose an enemy for Shatter Blow"
    timeout: 5000
- tapOn: "Dominion Dampener"
- extendedWaitUntil:
    visible: "HOSTILE CONTACT"
    timeout: 15000
- assertVisible: "Dominion Dampener"
- assertVisible: "Resonance Buoy"
- extendedWaitUntil:
    notVisible: "ATB"
    timeout: 1000
- extendedWaitUntil:
    notVisible: "R1 READY 4"
    timeout: 1000
- takeScreenshot: combat-enemy-status-rail
