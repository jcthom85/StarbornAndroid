appId: com.example.starborn
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Debug: Heavy Lifting"
    timeout: 60000
- tapOn: "Debug: Heavy Lifting"
- extendedWaitUntil:
    visible: "Loading Dock"
    timeout: 15000
- assertVisible: "Engage Acoustic Bulwark"
- tapOn: "Talk to Foreman Bogs"
- extendedWaitUntil:
    visible: ".*Loader's sitting idle.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "There are workers behind that pile."
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*Shipment clock doesn't pause.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    notVisible: "Dialogue Popup"
    timeout: 10000
- extendedWaitUntil:
    visible: "New Quest"
    timeout: 10000
- assertVisible: "Heavy Lifting"
- tapOn: "Dismiss"
- extendedWaitUntil:
    notVisible: "New Quest"
    timeout: 10000
- extendedWaitUntil:
    visible: "Quest Updated"
    timeout: 10000
- tapOn: "Dismiss Quest Banner"
- extendedWaitUntil:
    notVisible: "Quest Updated"
    timeout: 10000
- tapOn: "Inspect Loader"
- extendedWaitUntil:
    visible: "Quest Updated"
    timeout: 10000
- tapOn: "Dismiss Quest Banner"
- extendedWaitUntil:
    notVisible: "Quest Updated"
    timeout: 10000
- tapOn: "Inspect Cargo rail"
- extendedWaitUntil:
    visible: "Quest Updated"
    timeout: 10000
- assertVisible: "Learn Hydraulic Kick."
- tapOn: "Dismiss Quest Banner"
- extendedWaitUntil:
    notVisible: "Quest Updated"
    timeout: 10000
- tapOn: "Engage Acoustic Bulwark"
- extendedWaitUntil:
    visible: "HOSTILE CONTACT"
    timeout: 60000
- assertVisible: "Acoustic Bulwark"
- tapOn: "Nova"
- extendedWaitUntil:
    visible: "Attack"
    timeout: 20000
- tapOn: "Skills"
- extendedWaitUntil:
    visible: "Skills"
    timeout: 10000
- assertVisible: "Hydraulic Kick"
- tapOn: "Hydraulic Kick"
- extendedWaitUntil:
    visible: "CHOOSE AN ENEM.*"
    timeout: 10000
- tapOn: "Acoustic Bulwark"
- waitForAnimationToEnd:
    timeout: 8000
- extendedWaitUntil:
    visible: "Spoils Recovered"
    timeout: 60000
- tapOn: "Next"
- extendedWaitUntil:
    visible: "Level Up!"
    timeout: 10000
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Quest Completed"
    timeout: 30000
- assertVisible: "Heavy Lifting"
- tapOn: "Continue"
- extendedWaitUntil:
    notVisible: "Quest Completed"
    timeout: 10000
- takeScreenshot: heavy-lifting-complete
