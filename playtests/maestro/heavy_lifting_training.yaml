appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible: "Debug: Heavy Lifting"
    timeout: 60000
- tapOn: "Debug: Heavy Lifting"
- extendedWaitUntil:
    visible: "Loading Dock"
    timeout: 15000
- assertVisible: "Engage Acoustic Bulwark"
- tapOn: "Talk to Foreman Bogs"
- extendedWaitUntil:
    visible: ".*Loader's sitting idle.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "There are workers behind that pile."
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: ".*Shipment clock doesn't pause.*"
    timeout: 10000
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    notVisible: "Dialogue Popup"
    timeout: 10000
- extendedWaitUntil:
    visible: "New Quest"
    timeout: 10000
- assertVisible: "Heavy Lifting"
- tapOn: "Dismiss"
- extendedWaitUntil:
    notVisible: "New Quest"
    timeout: 10000
- extendedWaitUntil:
    visible: "Quest Updated"
    timeout: 10000
- tapOn: "Dismiss Quest Banner"
- extendedWaitUntil:
    notVisible: "Quest Updated"
    timeout: 10000
- tapOn: "Inspect Loader"
- extendedWaitUntil:
    visible: "Quest Updated"
    timeout: 10000
- tapOn: "Dismiss Quest Banner"
- extendedWaitUntil:
    notVisible: "Quest Updated"
    timeout: 10000
- tapOn: "Inspect Cargo rail"
- extendedWaitUntil:
    visible: "Quest Updated"
    timeout: 10000
- assertVisible: "Learn Hydraulic Kick."
- tapOn: "Dismiss Quest Banner"
- extendedWaitUntil:
    notVisible: "Quest Updated"
    timeout: 10000
- tapOn: "Engage Acoustic Bulwark"
- extendedWaitUntil:
    visible: "Foreman Bogs"
    timeout: 60000
- assertVisible: "That trainer eats direct hits.*"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible: "Foreman Bogs"
- tapOn: "Dialogue Popup. Tap to continue"
- extendedWaitUntil:
    visible: "Tap Nova when her action is ready."
    timeout: 10000
- tapOn: "Nova"
- extendedWaitUntil:
    visible: "Choose Attack. First, test the shield."
    timeout: 10000
- tapOn: "Attack"
- extendedWaitUntil:
    visible: "CHOOSE A TARGET"
    timeout: 10000
- assertVisible: "Acoustic Bulwark"
- tapOn: "Acoustic Bulwark"
- extendedWaitUntil:
    visible: "Direct Hit: Blocked"
    timeout: 20000
- assertVisible: "The shield reduced the attack to zero.*"
- tapOn: "Break The Guard"
- extendedWaitUntil:
    visible: "Nova is ready again.*"
    timeout: 10000
- tapOn: "Nova"
- extendedWaitUntil:
    visible: "Open Abilities to find a guard-breaking move."
    timeout: 20000
- tapOn: "Abilities"
- extendedWaitUntil:
    visible: "Abilities"
    timeout: 10000
- assertVisible: ".*Hydraulic Kick.*"
- tapOn:
    text: "Use"
    index: 1
- extendedWaitUntil:
    visible: "Choose an enemy for Hydraulic Kick"
    timeout: 10000
- tapOn: "Acoustic Bulwark"
- extendedWaitUntil:
    visible: "Guard Broken"
    timeout: 20000
- assertVisible: "Hydraulic Kick stripped the shield.*"
- tapOn: "Finish The Fight"
- extendedWaitUntil:
    visible: "Spoils Recovered"
    timeout: 60000
- takeScreenshot: combat-spoils-redesign
- tapOn: "Next"
- extendedWaitUntil:
    visible: "Level Up!"
    timeout: 10000
- takeScreenshot: combat-level-up-redesign
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "Quest Completed"
    timeout: 30000
- assertVisible: "Heavy Lifting"
- tapOn: "Continue"
- extendedWaitUntil:
    notVisible: "Quest Completed"
    timeout: 10000
- assertVisible: "People"
- takeScreenshot: heavy-lifting-complete
