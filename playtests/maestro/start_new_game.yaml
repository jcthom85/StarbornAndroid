appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "New Game"
    timeout: 60000
- tapOn: "New Game"
- extendedWaitUntil:
    visible: ".*SECTOR 9.*TWENTY YEARS EARLIER.*"
    timeout: 20000
- extendedWaitUntil:
    visible: ".*CONTAINMENT FAILURE.*FAR DOOR PRESSURE RISING.*"
    timeout: 12000
- extendedWaitUntil:
    visible: ".*doors bow inward.*operator locks a brass Chime.*"
    timeout: 12000
- takeScreenshot: intro-narration-caption
- extendedWaitUntil:
    visible: ".*Broadcast my identity.*Draw it away.*"
    timeout: 20000
- takeScreenshot: intro-unknown-dialogue
- extendedWaitUntil:
    visible: "Nova's Bunk"
    timeout: 45000
- extendedWaitUntil:
    notVisible: "New Game"
    timeout: 20000
- takeScreenshot: start-new-game
