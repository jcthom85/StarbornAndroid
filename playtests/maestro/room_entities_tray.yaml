- extendedWaitUntil:
    visible: "Debug: Enemy Party"
    timeout: 10000
- tapOn: "Debug: Enemy Party"
- extendedWaitUntil:
    visible: "Security Checkpoint B"
    timeout: 15000
- extendedWaitUntil:
    visible: "Engage Dominion Dampener"
    timeout: 10000
- assertVisible: "Engage Dominion Dampener"
- takeScreenshot: room-entities-tray
