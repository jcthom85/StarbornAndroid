appId: com.example.starborn
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "New Game"
    timeout: 60000
- tapOn: "New Game"
- extendedWaitUntil:
    visible: "GOT IT"
    timeout: 20000
- tapOn: "GOT IT"
- extendedWaitUntil:
    visible: "Nova's Bunk"
    timeout: 10000
- tapOn: "MENU"
- extendedWaitUntil:
    visible: "FIELD MENU"
    timeout: 10000
- tapOn: "Settings"
- extendedWaitUntil:
    visible: "AUDIO & DISPLAY"
    timeout: 10000
- tapOn: "Open Save Slots"
- extendedWaitUntil:
    visible: "SELECT SLOT TO SAVE"
    timeout: 10000
- tapOn: "Save Slot 1"
- extendedWaitUntil:
    notVisible: "SELECT SLOT TO SAVE"
    timeout: 10000
- tapOn: "Close"
- extendedWaitUntil:
    notVisible: "FIELD MENU"
    timeout: 10000
- assertVisible: "Nova's Bunk"
- tapOn: "MENU"
- extendedWaitUntil:
    visible: "FIELD MENU"
    timeout: 10000
- tapOn: "Settings"
- extendedWaitUntil:
    visible: "AUDIO & DISPLAY"
    timeout: 10000
- tapOn: "Open Load Slots"
- extendedWaitUntil:
    visible: "SELECT SLOT TO LOAD"
    timeout: 10000
- tapOn: "Load Slot 1"
- extendedWaitUntil:
    notVisible: "SELECT SLOT TO LOAD"
    timeout: 10000
- tapOn: "Close"
- extendedWaitUntil:
    visible: "Nova's Bunk"
    timeout: 10000
- takeScreenshot: save-load-roundtrip
