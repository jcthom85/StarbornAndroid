appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "New Game"
    timeout: 60000
- tapOn: "New Game"
- extendedWaitUntil:
    visible: "bunk light"
    timeout: 20000
- tapOn: "MENU"
- extendedWaitUntil:
    visible: "FIELD MENU"
    timeout: 10000
- swipe:
    start: 88%, 18%
    end: 12%, 18%
    duration: 500
- swipe:
    start: 88%, 18%
    end: 12%, 18%
    duration: 500
- tapOn: "Settings"
- extendedWaitUntil:
    visible: "Save Data"
    timeout: 10000
- tapOn: "Save"
- extendedWaitUntil:
    visible: "SAVE DATA"
    timeout: 10000
- tapOn: "Save"
- extendedWaitUntil:
    visible: "Quick Save"
    timeout: 10000
- tapOn: "Close"
- extendedWaitUntil:
    notVisible: "FIELD MENU"
    timeout: 10000
- assertVisible: "bunk light"
- extendedWaitUntil:
    visible: "CONTINUE"
    timeout: 10000
- tapOn: "CONTINUE"
- tapOn: "MENU"
- extendedWaitUntil:
    visible: "FIELD MENU"
    timeout: 10000
- swipe:
    start: 88%, 18%
    end: 12%, 18%
    duration: 500
- swipe:
    start: 88%, 18%
    end: 12%, 18%
    duration: 500
- tapOn: "Settings"
- extendedWaitUntil:
    visible: "Save Data"
    timeout: 10000
- tapOn: "Load"
- extendedWaitUntil:
    visible: "LOAD DATA"
    timeout: 10000
- tapOn: "Load"
- extendedWaitUntil:
    notVisible: "LOAD DATA"
    timeout: 10000
- tapOn: "Close"
- extendedWaitUntil:
    visible: "Continue"
    timeout: 10000
- tapOn: "Continue"
- extendedWaitUntil:
    visible: "bunk light"
    timeout: 10000
- takeScreenshot: save-load-roundtrip
