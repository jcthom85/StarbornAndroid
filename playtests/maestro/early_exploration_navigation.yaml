appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "New Game"
    timeout: 60000
- tapOn: "New Game"
- extendedWaitUntil:
    visible: "Wake Up Call"
    timeout: 20000
- tapOn: "Continue"
- tapOn: "CONTINUE"
- assertVisible: "bunk light"
- tapOn: "bunk light"
- extendedWaitUntil:
    visible: "The bunk light snaps on.*"
    timeout: 10000
- tapOn: ".*The bunk light snaps on.*"
- extendedWaitUntil:
    visible: "Nova's Bunk"
    timeout: 10000
- tapOn: "CONTINUE"
- swipe:
    direction: LEFT
    duration: 450
- extendedWaitUntil:
    visible: "Pod Row"
    timeout: 60000
- extendedWaitUntil:
    notVisible: "Wake Up Call"
    timeout: 10000
- tapOn: "MENU"
- extendedWaitUntil:
    visible: "FIELD MENU"
    timeout: 10000
- tapOn: "Close"
- extendedWaitUntil:
    notVisible: "FIELD MENU"
    timeout: 10000
- takeScreenshot: early-exploration-navigation
