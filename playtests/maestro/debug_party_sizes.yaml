appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Debug Scenarios"
    timeout: 60000
- tapOn: "Debug Scenarios"
- extendedWaitUntil:
    visible: "Systems"
    timeout: 10000
- tapOn: "Systems"
- scrollUntilVisible:
    element:
      text: "Enemy Party Sizes"
    direction: DOWN
    timeout: 10000
    visibilityPercentage: 70
- tapOn: "Enemy Party Sizes"
- extendedWaitUntil:
    visible: "Enemy Party Size Test"
    timeout: 15000
- takeScreenshot: debug-party-sizes
