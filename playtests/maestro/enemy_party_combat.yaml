appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "New Game"
    timeout: 60000
- swipe:
    direction: UP
- swipe:
    direction: UP
- extendedWaitUntil:
    visible: "Debug: Enemy Party"
    timeout: 10000
- tapOn: "Debug: Enemy Party"
- extendedWaitUntil:
    visible: "Security Checkpoint B"
    timeout: 15000
- extendedWaitUntil:
    visible: "Engage Dominion Dampener + Resonance Buoy party"
    timeout: 10000
- tapOn: "Engage Dominion Dampener + Resonance Buoy party"
- extendedWaitUntil:
    visible: "HOSTILE CONTACT"
    timeout: 60000
- extendedWaitUntil:
    notVisible: "Round [0-9]+"
    timeout: 1000
- extendedWaitUntil:
    notVisible: "ATB"
    timeout: 1000
- extendedWaitUntil:
    notVisible: "Dominion Dampener \\+ Resonance Buoy"
    timeout: 1000
- extendedWaitUntil:
    notVisible: "R1 READY 4"
    timeout: 1000
- assertVisible: "Nova"
- assertVisible: "Zeke"
- assertVisible: "Dominion Dampener"
- assertVisible: "Resonance Buoy"
- takeScreenshot: enemy-party-combat
