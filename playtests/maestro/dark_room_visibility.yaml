appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "New Game"
    timeout: 60000
- tapOn: "Debug Scenarios"
- tapOn: "Search world, quest, room, or system"
- inputText: "live deep"
- pressKey: BACK
- extendedWaitUntil:
    visible: "Dynamic Patrol"
    timeout: 10000
- tapOn: "Dynamic Patrol"
- extendedWaitUntil:
    visible: "HOSTILE CONTACT"
    timeout: 20000
- assertVisible: "Conveyor Belt"
- assertVisible: "Pressure Hauler"
- assertVisible: "Nova"
- assertVisible: "Zeke"
- takeScreenshot: dark-room-visibility
