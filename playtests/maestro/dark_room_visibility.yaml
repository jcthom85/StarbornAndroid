appId: com.junewiregames.starborn.prealpha
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "New Game"
    timeout: 60000
- swipe:
    direction: UP
- extendedWaitUntil:
    visible: "Debug: Dynamic Patrol"
    timeout: 10000
- tapOn: "Debug: Dynamic Patrol"
- extendedWaitUntil:
    visible: "Dark Room"
    timeout: 15000
- assertVisible: "It's too dark to see what's here."
- assertNotVisible: "It's too dark to make out the room."
- assertNotVisible: "Conveyor Belt"
- assertNotVisible: "Pressure Hauler"
- assertNotVisible: "Engage"
- takeScreenshot: dark-room-visibility
