appId: com.example.starborn
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "New Game"
    timeout: 60000
- swipe:
    direction: UP
- swipe:
    direction: UP
- extendedWaitUntil:
    visible: "Debug: Enemy Party"
    timeout: 10000
- tapOn: "Debug: Enemy Party"
- extendedWaitUntil:
    visible: "Security Checkpoint B"
    timeout: 15000
- extendedWaitUntil:
    visible: "Engage Dominion Dampener + Resonance Buoy party"
    timeout: 10000
- tapOn: "Engage Dominion Dampener + Resonance Buoy party"
- extendedWaitUntil:
    visible: "HOSTILE CONTACT"
    timeout: 60000
- tapOn: "Orion"
- extendedWaitUntil:
    visible: "Attack"
    timeout: 15000
- assertVisible: "Skills"
- assertVisible: "Items"
- assertVisible: "Retreat"
- extendedWaitUntil:
    notVisible: "Round [0-9]+"
    timeout: 1000
- extendedWaitUntil:
    notVisible: "ATB"
    timeout: 1000
- extendedWaitUntil:
    notVisible: "R1 READY 4"
    timeout: 1000
- takeScreenshot: combat-command-menu
